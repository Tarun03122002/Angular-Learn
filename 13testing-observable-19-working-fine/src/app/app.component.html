<div style="margin-top: 50px; display: flex; flex-direction: column;  justify-content: center; gap: 10px;">
  <h3>Number</h3>
  @for(num of dataList;track $index){
    <div style="color:grey;padding: 10px; width: 100px; height: 30px;background-color: black;">{{num}}</div>
  }
  <button style="width: 140px;" (click)="onClick()">Show Numbers</button>
</div>
