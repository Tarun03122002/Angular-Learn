<section class="container">
  <header>Registration Form</header>

  <!-- 1) ngForm directive will store the referennec of js object for that form and I am assign reference of form in registrationForm template variable -->
   <!-- 2) Creating form control ,need to use name property and ngModel directive(used to tell it is a form control) -->
    <!-- 3) A form is considered as touched if any of its form control is touched.by default form control is marked as touched ,when we focus on one field and click outside that field -->
     <!-- 4) a form is marked as dirty if any of its form control have same value changed from its previous value.If it's value does not change ,then that form or form control wiulll be pristine-->
  <form class="form"  #registrationForm="ngForm" (ngSubmit)="onSubmit()">
    <div class="column">
      <div class="input-box">
        <input type="text" placeholder="First Name" name="fName" ngModel />
      </div> 

      <div class="input-box">
        <input type="text" placeholder="Last Name" name="lName" ngModel/>
      </div>
    </div>    

    <div class="input-box">
      <input type="text" placeholder="Email" name="email" ngModel/>
    </div>

    <div class="column">
      <div class="input-box">
        <input type="number" placeholder="Phone Number"  name="phoneNo" ngModel/>
      </div>
      <div class="input-box">
        <input type="date" placeholder="Date of Birth" name="dob" ngModel/>
      </div>
    </div>



    <div class="gender-box">
      <h3>Gender</h3>
      <div class="gender-option">
        @for(gender of genderList;track $index){
        <div class="gender">
          <input type="radio" [id]="gender.id"  name="gender" [value]="gender.value" ngModel />
          <label [for]="gender.id">{{gender.label}}</label>
        </div>
        }

    
      </div>
    </div>

    <div class="input-box address">
      <label>Address</label>
      <input type="text" placeholder="Street address"  name="streetAdd1" ngModel/>
      <input type="text" placeholder="Street address line 2" name="streetAdd2" ngModel/>
      <div class="column">
        <div class="select-box">
          <select  name="country" ngModel>
            <option hidden>Country</option>
            <option>America</option>
            <option>Japan</option>
            <option>India</option>
            <option>Nepal</option>
          </select>
        </div>
        <input type="text" placeholder="City" />
      </div>
      <div class="column">
        <input type="text" placeholder="Region" name="region" ngModel />
        <input type="number" placeholder="Postal code"  name="postalCode" ngModel/>
      </div>
    </div>
    <input type="submit" value="Submit" class="submit-btn"> 
    <!-- by default a button present in form is of type=submit -->
  </form>
</section>
