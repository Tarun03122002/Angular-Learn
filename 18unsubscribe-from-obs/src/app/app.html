<div>
  <h2>Unsubscribe from Observable</h2>
  <div style="display: flex; gap: 20px;">
    <div>
      <h2>DataList 1</h2>
      @for(element of data1;track $index){
      <div></div>
      {{element}}
      }
      <div>
        <button (click)="subscribe1()">Subscribe</button>
        <button (click)="unsubscribe1()">Unsubscribe</button>

      </div>
    </div>
