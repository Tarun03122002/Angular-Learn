<table>
    <tr>
        <th>Name</th>
        <th>Gender</th>
        <th>Membership</th>
        <th>Price</th>
        <th>Status</th>
        <th>Action</th>
    </tr>
    <tr *ngFor="let user of users">
        <td>{{ user.name}}</td>
        <td>{{ user.gender}}</td>
        <td>{{ user.membership}}</td>
        <td>{{ user.price}}</td>
        <td>{{ user?.isActive ? 'Active' : 'Inactive'}}</td>
        <td>
            <button class="delete-button" style="cursor: pointer;" (click)="userDeleteClicked(user)">
               Delete
            </button>
        </td>
    </tr>
</table>
<confirm-delete *ngIf="showDialog" (dialogActionClicked)="dialogActionSubscribe($event)"></confirm-delete>
